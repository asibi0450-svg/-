<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>今日の誰かの日記</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding-top: 70px;
  background: #f7f7f7;
}

.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: white;
  padding: 15px 20px;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
  z-index: 1000;
}

.timeline {
  max-width: 600px;
  margin: 0 auto;
}

.entry {
  background: white;
  padding: 15px;
  border-bottom: 1px solid #e5e5e5;
}

.entry-header {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.avatar {
  width: 50px;
  height: 50px;
  object-fit: cover;
  margin-right: 10px;
}

.name-line {
  font-size: 16px;
}

.life {
  font-size: 13px;
  color: #888;
  margin-left: 8px;
}

.main-text {
  font-size: 18px;
  line-height: 1.6;
  margin: 10px 0 3px 0;
  white-space: pre-line;
}

.read-more {
  font-size: 18px;
  color: #1d9bf0;
  cursor: pointer;
  display: inline;
}

.original-text {
  font-size: 18px;
  line-height: 1.6;
  margin-top: 10px;
  display: none;
  white-space: pre-line;
}

.toggle-btn {
  font-size: 12px;
  background: none;
  border: none;
  color: #1d9bf0;
  cursor: pointer;
  padding: 0;
  margin-left: 10px;
}

/* 下部メタ行 */
.meta-line {
  display: flex;
  align-items: center;
  font-size: 12px;
  color: #666;
  margin-top: 15px;
}

.meta-date {
  margin-right: 10px;
  color: #888;
}

.meta-summary {
  flex: 1;
  color: #666;
}

.source-link {
  color: #1d9bf0;
  text-decoration: none;
  margin-left: 10px;
}
</style>
</head>
<body>

<div class="header">今日の誰かの日記</div>
<div class="timeline" id="diary"></div>

<script>

function toggleMain(span) {
  const entry = span.closest(".entry");
  const textDiv = entry.querySelector(".main-text");
  const full = span.dataset.full;
  const short = span.dataset.short;

  if (span.textContent === "続きを読む") {
    textDiv.textContent = full;
    span.textContent = "小さくまとめる";
  } else {
    textDiv.textContent = short;
    span.textContent = "続きを読む";
  }
}

function toggleOriginal(button) {
  const entry = button.closest(".entry");
  const original = entry.querySelector(".original-text");

  if (original.style.display === "none") {
    original.style.display = "block";
    button.textContent = "原文を隠す";
  } else {
    original.style.display = "none";
    button.textContent = "原文を表示";
  }
}

fetch("data.json")
.then(response => response.json())
.then(data => {

  const todayKey = "03-04";

  const filtered = data.filter(item => item.date === todayKey);
  const diaryDiv = document.getElementById("diary");

  filtered.forEach(item => {

    const previewLength = 130;
    const fullText = item.text_translation;
    const shortText = fullText.length > previewLength
      ? fullText.substring(0, previewLength) + "..."
      : fullText;

    diaryDiv.innerHTML += `
      <div class="entry">

        <div class="entry-header">
          <img class="avatar" src="${item.author.icon_url}" alt="">
          <div class="name-line">
            ${item.author.name}
            <span class="life">
              ${item.author.birth_year}–${item.author.death_year}
            </span>
          </div>
        </div>

        <div class="main-text">${shortText}</div>

        ${fullText.length > previewLength ? `
          <span class="read-more"
            data-full="${fullText.replace(/"/g,'&quot;')}"
            data-short="${shortText.replace(/"/g,'&quot;')}"
            onclick="toggleMain(this)">
            続きを読む
          </span>
        ` : ""}

        <div class="original-text">${item.text_original}</div>

        <div class="meta-line">
          <span class="meta-date">
            ${item.year}年 ${todayKey}
            <button class="toggle-btn" onclick="toggleOriginal(this)">
              原文を表示
            </button>
          </span>

          <span class="meta-summary">
            ${item.author.summary}
          </span>

          <a class="source-link" href="${item.source}" target="_blank">
            出典を見る
          </a>
        </div>

      </div>
    `;
  });

});
</script>

</body>
</html>
