<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>今日の誰かの日記</title>
<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
  line-height: 1.8;
}

.entry {
  margin-bottom: 40px;
  padding-bottom: 25px;
  border-bottom: 1px solid #ccc;
}

.author-bio {
  background: #f5f5f5;
  padding: 10px;
  margin: 10px 0 20px 0;
  font-size: 0.9em;
}

.small-link {
  font-size: 0.75em;
  margin-left: 6px;
}

.main-text {
  font-size: 1.25em;
  margin-top: 10px;
  white-space: pre-line;
}

.toggle-btn {
  font-size: 0.8em;
  margin-bottom: 8px;
  background: none;
  border: none;
  color: #0077cc;
  cursor: pointer;
}

.translation {
  color: #555;
  margin-top: 15px;
}

.note {
  font-size: 0.8em;
  color: #777;
  margin-top: 6px;
}
</style>
</head>
<body>

<h1>今日の誰かの日記</h1>
<div id="diary"></div>

<script>

function toggleText(button) {
  const container = button.closest(".text-container");
  const textElement = container.querySelector(".main-text");

  const fullText = container.dataset.full;
  const shortText = container.dataset.short;

  if (button.textContent === "続きを読む") {
    textElement.textContent = fullText;
    button.textContent = "小さくまとめる";
    window.scrollTo({ top: container.offsetTop - 40, behavior: "smooth" });
  } else {
    textElement.textContent = shortText;
    button.textContent = "続きを読む";
    window.scrollTo({ top: container.offsetTop - 40, behavior: "smooth" });
  }
}

fetch("data.json")
.then(response => response.json())
.then(data => {

  const today = new Date();
  const month = String(today.getMonth()+1).padStart(2,'0');
  const day = String(today.getDate()).padStart(2,'0');
  const todayKey = month + "-" + day;

  const filtered = data.filter(item => item.date === todayKey);
  const diaryDiv = document.getElementById("diary");

  if(filtered.length === 0){
    diaryDiv.innerHTML = "今日はまだ日記がありません。";
    return;
  }

  filtered.forEach(item => {

    const previewLength = 200;
    const fullText = item.text_original;
    const shortText = fullText.length > previewLength
      ? fullText.substring(0, previewLength) + "..."
      : fullText;

    diaryDiv.innerHTML += `
      <div class="entry">
        <h2>
          ${item.year}年 ${item.author.name}
          (${item.author.birth_year}–${item.author.death_year})
        </h2>

        <div class="author-bio">
          ${item.author.summary}
          <a class="small-link" href="${item.author.reference_url}" target="_blank">
            [${item.author.reference_label}]
          </a>
        </div>

        <div class="text-container"
             data-full="${fullText.replace(/"/g, '&quot;')}"
             data-short="${shortText.replace(/"/g, '&quot;')}">

          <button class="toggle-btn" onclick="toggleText(this)">
            続きを読む
          </button>

          <p class="main-text">${shortText}</p>
        </div>

        ${item.text_translation ? `
          <p class="translation">${item.text_translation}</p>
          <div class="note">※ 日本語訳はGPTによる翻訳です。</div>
        ` : ""}

        <div class="note">
          <a href="${item.source}" target="_blank">出典を見る</a>
        </div>

      </div>
    `;
  });

})
.catch(error => {
  document.getElementById("diary").innerHTML =
    "データの読み込みでエラーが出ています。";
  console.error(error);
});
</script>

</body>
</html>
