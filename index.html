<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>今日の誰かの日記</title>
<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
  line-height: 1.7;
}
.entry {
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 1px solid #ccc;
}
.translation {
  color: #555;
  margin-top: 10px;
}
.note {
  font-size: 0.85em;
  color: #777;
}
.author-bio {
  background: #f5f5f5;
  padding: 10px;
  margin: 10px 0;
  font-size: 0.9em;
}
.small-link {
  font-size: 0.75em;
  margin-left: 5px;
}
</style>
</head>
<body>

<h1>今日の誰かの日記</h1>
<div id="diary"></div>

<script>
fetch("data.json")
.then(response => response.json())
.then(data => {
  const today = new Date();
  const month = String(today.getMonth()+1).padStart(2,'0');
  const day = String(today.getDate()).padStart(2,'0');
  const todayKey = month + "-" + day;

  const filtered = data.filter(item => item.date === todayKey);
  const diaryDiv = document.getElementById("diary");

  if(filtered.length === 0){
    diaryDiv.innerHTML = "今日はまだ日記がありません。";
    return;
  }

  filtered.forEach(item => {
    diaryDiv.innerHTML += `
      <div class="entry">
        <h2>
          ${item.year}年 ${item.author.name}
          (${item.author.birth_year}–${item.author.death_year})
        </h2>

        <div class="author-bio">
          ${item.author.summary}
          <a class="small-link" href="${item.author.reference_url}" target="_blank">
            [${item.author.reference_label}]
          </a>
        </div>

        <p>${item.text_original}</p>

        ${item.text_translation ? `
          <p class="translation">${item.text_translation}</p>
          <div class="note">※ 日本語訳はGPTによる翻訳です。</div>
        ` : ""}

        <div class="note">
          <a href="${item.source}" target="_blank">出典を見る</a>
        </div>
      </div>
    `;
  });
})
.catch(error => {
  document.getElementById("diary").innerHTML = "データの読み込みでエラーが出ています。";
  console.error(error);
});
</script>

</body>
</html>
