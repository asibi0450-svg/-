<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>今日の誰かの日記</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding-top: 70px;
  background: #f7f7f7;
}

/* 固定ヘッダー */
.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: white;
  padding: 15px 20px;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
  z-index: 1000;
}

/* タイムライン */
.timeline {
  max-width: 600px;
  margin: 0 auto;
}

/* 投稿カード */
.entry {
  background: white;
  padding: 15px;
  border-bottom: 1px solid #e5e5e5;
  position: relative;
}

/* ヘッダー部 */
.entry-header {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.avatar {
  width: 50px;
  height: 50px;
  background: #ccc;
  margin-right: 10px;
}

.name-line {
  font-size: 16px;
}

.life {
  font-size: 13px;
  color: #888;
  margin-left: 8px;
}

/* 本文 */
.main-text {
  font-size: 18px;
  line-height: 1.6;
  margin: 10px 0;
  white-space: pre-line;
}

/* 原文 */
.original-text {
  font-size: 18px;
  line-height: 1.6;
  margin-top: 10px;
  display: none;
  white-space: pre-line;
}

/* ボタン */
.toggle-btn {
  font-size: 13px;
  background: none;
  border: none;
  color: #1d9bf0;
  cursor: pointer;
  padding: 0;
  margin-top: 5px;
}

/* 左下 日付 */
.meta-left {
  font-size: 12px;
  color: #888;
  position: absolute;
  bottom: 8px;
  left: 15px;
}

/* 右下 略歴 */
.meta-right {
  font-size: 12px;
  color: #666;
  position: absolute;
  bottom: 8px;
  right: 15px;
  max-width: 55%;
  text-align: right;
}
</style>
</head>
<body>

<div class="header">今日の誰かの日記</div>

<div class="timeline" id="diary"></div>

<script>

function toggleMain(button) {
  const text = button.parentElement.querySelector(".main-text");
  const full = button.dataset.full;
  const short = button.dataset.short;

  if (button.textContent === "続きを読む") {
    text.textContent = full;
    button.textContent = "小さくまとめる";
  } else {
    text.textContent = short;
    button.textContent = "続きを読む";
  }
}

function toggleOriginal(button) {
  const original = button.parentElement.querySelector(".original-text");
  if (original.style.display === "none") {
    original.style.display = "block";
    button.textContent = "原文を隠す";
  } else {
    original.style.display = "none";
    button.textContent = "原文を表示";
  }
}

fetch("data.json")
.then(response => response.json())
.then(data => {

  const today = new Date();
  const month = String(today.getMonth()+1).padStart(2,'0');
  const day = String(today.getDate()).padStart(2,'0');
  const todayKey = month + "-" + day;

  const filtered = data.filter(item => item.date === todayKey);
  const diaryDiv = document.getElementById("diary");

  filtered.forEach(item => {

    const previewLength = 150;
    const fullText = item.text_translation;
    const shortText = fullText.length > previewLength
      ? fullText.substring(0, previewLength) + "..."
      : fullText;

    diaryDiv.innerHTML += `
      <div class="entry">

        <div class="entry-header">
          <div class="avatar"></div>
          <div class="name-line">
            ${item.author.name}
            <span class="life">
              ${item.author.birth_year}–${item.author.death_year}
            </span>
          </div>
        </div>

        <div class="main-text">${shortText}</div>

        <button class="toggle-btn"
          data-full="${fullText.replace(/"/g,'&quot;')}"
          data-short="${shortText.replace(/"/g,'&quot;')}"
          onclick="toggleMain(this)">
          続きを読む
        </button>

        <button class="toggle-btn" onclick="toggleOriginal(this)">
          原文を表示
        </button>

        <div class="original-text">
          ${item.text_original}
        </div>

        <div class="meta-left">
          ${item.year}年 ${todayKey}
        </div>

        <div class="meta-right">
          ${item.author.summary}
        </div>

      </div>
    `;
  });

});
</script>

</body>
</html>
