<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>今日の誰かの日記</title>
<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
  line-height: 1.7;
}
.entry {
  margin-bottom: 30px;
}
</style>
</head>
<body>

<h1>今日の誰かの日記</h1>
<div id="diary"></div>

<script>
fetch("data.json")
.then(response => response.json())
.then(data => {
  const today = new Date();
  const month = String(today.getMonth()+1).padStart(2,'0');
  const day = String(today.getDate()).padStart(2,'0');
  const todayKey = month + "-" + day;

  const filtered = data.filter(item => item.date === todayKey);
  const diaryDiv = document.getElementById("diary");

  if(filtered.length === 0){
    diaryDiv.innerHTML = "今日はまだ日記がありません。";
  } else {
    filtered.forEach(item => {
      diaryDiv.innerHTML += `
        <div class="entry">
          <h2>${item.year}年 ${item.author}</h2>
          <p>${item.text}</p>
<p><a href="${item.source}" target="_blank">出典を見る</a></p>
        </div>
      `;
    });
  }
})
.catch(error => {
  document.getElementById("diary").innerHTML = "データの読み込みでエラーが出ています。";
  console.error(error);
});
</script>

</body>
</html>
