<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Diary Test</title>
<style>
body {
  font-family: sans-serif;
}

.entry {
  border-bottom: 1px solid #ccc;
  padding: 20px 0;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
}

.icon {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 50%;
}

.icon-placeholder {
  width: 80px;
  height: 80px;
}

.meta {
  flex: 1;
}

.date-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.buttons {
  display: flex;
  gap: 15px;
}

button {
  background: none;
  border: none;
  color: blue;
  cursor: pointer;
  font-size: 14px;
  padding: 0;
}

.summary {
  margin-top: 5px;
}

.text {
  margin-top: 10px;
}

.hidden {
  display: none;
}
</style>
</head>
<body>

<div id="container"></div>

<script>
const data = {
  date: "1665-03-04",
  author: {
    name: "Samuel Pepys",
    icon_url: "https://upload.wikimedia.org/wikipedia/commons/1/1c/Samuel_Pepys_by_John_Hayls.jpg", // ← テスト用画像
    summary: "17世紀イングランドの海軍官僚・日記作者。",
    reference_label: "Wikipedia",
    reference_url: "https://en.wikipedia.org/wiki/Samuel_Pepys"
  },
  text_original: "Up betimes and to the office...",
  text_translation: "朝早く起きて役所へ行った。"
};

function renderEntry(entry) {
  const container = document.getElementById("container");

  const div = document.createElement("div");
  div.className = "entry";

  const header = document.createElement("div");
  header.className = "header";

  // アイコン処理
  if (entry.author.icon_url) {
    const img = document.createElement("img");
    img.src = entry.author.icon_url;
    img.className = "icon";
    header.appendChild(img);
  } else {
    const placeholder = document.createElement("div");
    placeholder.className = "icon-placeholder";
    header.appendChild(placeholder);
  }

  const meta = document.createElement("div");
  meta.className = "meta";

  const dateLine = document.createElement("div");
  dateLine.className = "date-line";

  const dateSpan = document.createElement("span");
  dateSpan.textContent = entry.date;

  const buttons = document.createElement("div");
  buttons.className = "buttons";

  const bioBtn = document.createElement("button");
  bioBtn.textContent = "略歴";

  const refBtn = document.createElement("button");
  refBtn.textContent = "出典を見る";
  refBtn.onclick = () => {
    window.open(entry.author.reference_url, "_blank");
  };

  buttons.appendChild(bioBtn);
  buttons.appendChild(refBtn);

  dateLine.appendChild(dateSpan);
  dateLine.appendChild(buttons);

  const summary = document.createElement("div");
  summary.className = "summary hidden";
  summary.textContent = entry.author.summary;

  bioBtn.onclick = () => {
    summary.classList.toggle("hidden");
  };

  const text = document.createElement("div");
  text.className = "text";
  text.textContent = entry.text_translation;

  meta.appendChild(dateLine);
  meta.appendChild(summary);
  meta.appendChild(text);

  header.appendChild(meta);
  div.appendChild(header);
  container.appendChild(div);
}

renderEntry(data);
</script>

</body>
</html>
